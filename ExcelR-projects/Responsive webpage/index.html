<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header>
  <div class="logo">Shop</div>
  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Products</a></li>
      <li><a href="#">Categories</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
</header>

<!-- Hero Section -->
<section class="hero">
  <div class="hero-text">
    <h1>New Collection 2026</h1>
    <p>Discover the latest trends</p>
    <button>Shop Now</button>
  </div>
</section>

<!-- Products -->
<section class="products">
  <h2>Featured Products</h2>

  <div class="product-container">

    <div class="card">
      <img src="./Media/1.webp">
      <h3>Shoes</h3>
      <p>$50</p>
    </div>

    <div class="card">
      <img src="./Media/2.webp">
      <h3>Watch</h3>
      <p>$80</p>
    </div>

    <div class="card">
      <img src="./Media/3.jpg">
      <h3>Bag</h3>
      <p>$40</p>
    </div>

    <div class="card">
      <img src="./Media/4.webp">
      <h3>T-Shirt</h3>
      <p>$20</p>
    </div>

  </div>
</section>

<!-- Footer -->
<footer>
  <p>&copy; 2026 Shop. All Rights Reserved</p>
</footer>

</body>
</html>
