<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
</head>

    <style>
        div {
            width: 200px;
            height: 100px;
            background-color: 1px solid black;
            background-color: rgb(255, 0, 0, 0.2);
            background-color: green;
        }
        /* color - names
                 - rgb(red, green, blue)
                 - rgba(red, green, blue, alpha) -- [fully transparent] 0 to 1 [fully opaque]
                 - hsl(hue, saturation, lightness)
                 -hexadecimal #RRGGBB --  {hex}
        */
    </style>
<body>
    <div></div>
</body>    
</body>
</html>
