<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formating tags</title>
    <style>
        marquee {
            border: 1px solid black;
            height: 80px;
            margin: 10px;
        }
    </style>
</head>

<body>

      <details>
         <summary>HTML</summary>
         <p>hyper text markup language</p>
      </details>

    <br><br><br><br><br>

    <!-- html entities -- for special characters -->
    <p> 5 &lt; 3</p>
    <p>&copy;</p>




    <!-- default direction: left -->
    <marquee behavior="" direction="" bgcolor="yellow" scrolldelay="300">Element</marquee>
    <marquee behavior="" direction="left">Element</marquee>
    <marquee behavior="" direction="right">Element</marquee>
    <marquee behavior="" direction="up">Element</marquee>
    <marquee behavior="" direction="down">Element</marquee>

    <hr>
    <!-- default behaviour is scroll -->
    <marquee behavior="" direction="">Element</marquee>
    <marquee behavior="scroll" direction="">scroll</marquee>
    <marquee behavior="slide" direction="">slide</marquee>
    <marquee behavior="alternate" direction="">alternate</marquee>





</body>

</html>
