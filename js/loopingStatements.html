<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looping Statements</title>
</head>
<body>

    <script>
        console.log("for loop -------");  
        for(let x=1;x<=5;x++){
            console.log(x);
        }
               
     console.log("while loop-----");
      let a=1; // declaring and assiging
      while(a<=5){ //condition
        console.log(a);  
        a++; //update / re -assiging
      }

console.log("do while loop----");

      let b=8;
      do{
       console.log(b);
       b++;
      } while(b<=7)
      

    </script>
    
</body>
</html>
