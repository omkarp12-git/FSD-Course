<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Manipulation</title>
</head>
<body>
    
   
    <p id="p1" class="p" style="color: red;">Lorem, ipsum dolor sit amet consectetur adipisicing elit. A, enim!</p>


    <img>

     <script>

        let p=document.getElementById('p1');
        console.log(p);

        // accessing attribute
       console.log( p.getAttribute('id'));
       console.log( p.getAttribute('class'));
       console.log( p.getAttribute('style'));

      // add attribute
             let img=document.getElementsByTagName('img');
             img[0].setAttribute('src','./image.png')
             img[0].setAttribute('height','300ppx')
             img[0].setAttribute('width','300ppx')
    //  checking 
        console.log('before removing',img[0].hasAttribute('width'));

        // removing attribute
        img[0].removeAttribute('width')
        console.log('after removing',img[0].hasAttribute('width'));
        

      
        
     </script>


</body>
</html>
