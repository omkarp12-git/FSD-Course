<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form {
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <!--  create a form  of two inputs 
         1.Validate with db crendetilas(static data)
         2.if userName and Password is correct then naviagte to www.w3schools
         3.if userName or password is wrong then we need to print message on browser
    -->

    <form action="#" id="form">
        <input type="text" name="userName" id="userName" placeholder="enter userName"><br><br>
        <input type="text" name="password" id="password" placeholder="enter password"><br><br>
        <button type="submit">LOGIN</button>
    </form>

    <script>
        let userName = "admin";
        let password = "admin@123";
        let form = document.getElementById('form');

        
        form.addEventListener('submit', (event) => {
            // event.preventDefault(); // stop reload the page
            let name = document.getElementById('userName').value;
            let pwd = document.getElementById('password').value;
            let h2 = document.createElement('h2');
            if (name === userName) {
                if (pwd === password) {
                    window.location.href = 'https://www.w3schools.com/'
                }
                else{
                    h2.innerHTML = 'password is incorrect'  
                }
            } else {
                h2.innerHTML = name+ ' is wrong please enter correct userName'  
            }
            h2.style.color = 'red'
            form.prepend(h2);
        })

    </script>

</body>

</html>
