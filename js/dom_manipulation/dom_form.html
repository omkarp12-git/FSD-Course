<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Form</title>
    <style>
        form{
            border: 1px solid black;
            padding: 10px;
            width: 250px;
        }
        .error{
            color: red;
        }
    </style>
</head>
<body>
        <!-- Create a form of two inputs
        1. Validate with DB credentials(static data)
        2. if Username and password is correct then navigate to www.w3schools.
        3. if username or passowrd is wrong then we need to print message on browser. 
    -->

<form action="#" id="form">

    <div id="errorBox"></div>

    <input type="text" id="userName" placeholder="Enter UserName"><br><br>
    <input type="password" id="password" placeholder="Enter Password"><br><br>
    <button type="submit">LOGIN</button>
</form>

<script>
    let userName = "admin";
    let password = "admin@123";

    document.getElementById('form').addEventListener('submit', (event)=>{
        event.preventDefault();

        let name = document.getElementById('userName').value;
        let pwd = document.getElementById('password').value;

        
        let errorBox = document.getElementById('errorBox');
        errorBox.innerHTML = "";

        if(name === userName && pwd === password){
            window.location.href = "https://www.w3schools.com/";
        } else {
            if(name !== userName){
                let userError = document.createElement('h3');
                userError.innerText = "Username is wrong";
                userError.className = "error";
                errorBox.appendChild(userError);
            }

            
            if(pwd !== password){
                let passError = document.createElement('h3');
                passError.innerText = "Password is wrong";
                passError.className = "error";
                errorBox.appendChild(passError);
            }
        }
    });
</script>

</body>
</html>
