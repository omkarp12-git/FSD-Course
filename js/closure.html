    <title>Closure Example</title>
</head>
<body>
    
    <script>
        function outer(){
            let count=0; // declaration
            console.log('outer function');
            
                       return function inner(){
                            count++;
                        console.log('count : ',count, 'in inner function');
                        
                        }
        }

       let result= outer();
       result();
       result();
       result();

    </script>

</body>
