<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even_Odd Numbers</title>
</head>
<!-- check the number is even or not from 1 to 10 -->
<body>
    <script>
       
       function even_odd(num){
         if (num % 2 == 0) {
            console.log(num, ' is a  even number');
        }
        else {
            console.log(num, ' is a  odd number');

        }
       }
       for(let num=1;num<=10;num++){
        even_odd(num);
       }
    </script>

</body>

</html>
