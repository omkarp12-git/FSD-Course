<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice Table</title>
    <link rel="stylesheet" href="table3.css">
</head>
<body>

<div class="container">
    <table>
        <tr>
            <th>Item</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Extended</th>
        </tr>

        <tr>
            <td>Hard Disk</td>
            <td>1</td>
            <td>500$</td>
            <td>400$</td>
        </tr>

        <tr>
            <td>Cd Drive</td>
            <td>1</td>
            <td>200$</td>
            <td>500$</td>
        </tr>

        <tr>
            <td>Cds</td>
            <td>10</td>
            <td>20$</td>
            <td>50$</td>
        </tr>

        <tr>
            <th colspan="3" class="total-text">Total Amount</th>
            <th class="total-value">950$</th>
        </tr>
    </table>
</div>

</body>
</html>
