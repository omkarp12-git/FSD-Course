<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <!-- <form action="https://httpbin.org/post" method="post"> -->
    <form action="" method="get">

      <label for="age">Age</label>
      <input type="color" name="age" id="age" placeholder="enter age" >

      <label for="name">Name</label>
      <input type="text" name="name"  id="name" placeholder="enter your name">

      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
</body>
</html>
<!-- 

   action : where the data is sent(backend)
   method : how data is sent to backend 
            1.get ---- we can display the data in the format of key and value pair
            2.post --- we can hide the data in url
   name : it is used to specifify keyName


http://127.0.0.1:5500/day_6%20(forms)/form1.html

http://127.0.0.1:5500/day_6%20(forms)/form1.html?age=456&name=radha  

  url/action?k1=v1&k2=v2 -----query String / Query parameters ---- method - get
  url/action -------method - post
