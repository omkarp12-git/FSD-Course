<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Web Design Task</title>
    <link rel="icon" href="../day7(positions)/media/favicon.png" type="image/x-icon">
    <style>
        .box{
            height: 400px;
            width: 400px;
            background-color: red;
        }

        /* Media Queries must be written at the end of the code*/
        @media screen and (min-width: 500px) and (max-width: 900px){
            .box{
                border-radius: 50%;
            }
        }
        @media screen and (max-width: 500px){
            .box{
                background:linear-gradient(to right, red, blue);
                border-radius: 50%;
            }
        }

        /* Orientation : portrait (width < height)
                         landscape (width > height) */
        @media screen and (orientation: portrait){
            .box{
                height: 200px;
                width: 200px;
                background: linear-gradient(to left, yellow, purple);
            }
        }                
        
        @media screen and (orientation: portrait){
            .box{
                background: url(../day7\(positions\)/media/Image.png);
            }
        }
        
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
