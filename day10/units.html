<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .p1{
            width: 100px;
            background-color: red;
            font-size: 50px;

        }
        .p2{
            width: 40%;
            background-color: blue;
            font-size: 50px;
        }

        .parent{
            border: 1px solid black;
            width: 700px;
        }
    </style>
</head>
<body>
    <p class="p1">100px</p>
    <p class="p2">40%</p>

    <div class="parent">
        <p class="p1">100px</p>
        <p class="p2">40%</p>  
    </div>
</body>
</html>

<!-- Absolute units(fixed units)
        - pixels(px)
        - points(pt)
        - inches(in)
        - centimeters(cm)
        - millimeters(mm)
        - picas(pc)

     Relative units(responsive units)
        - % (percent)
        - em (relative to the font-size of the element)
        - rem (relative to the font-size of the root element)
        - vw (relative to 1% of the width of the viewport)[viewport width]
        - vh (relative to 1% of the height of the viewport)[viewport height]

     -->
